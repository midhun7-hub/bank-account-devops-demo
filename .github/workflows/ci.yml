name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-test-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build Project
        run: mvn package

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bank-account-jar
          path: target/*.jar

      - name: Wait One Minute (Testing)
        run: sleep 3600

      - name: Deploy
        run: |
          echo "Deploying application..."
          ls -la target
          echo "Deployment successful"